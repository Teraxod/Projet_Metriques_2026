<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vitesse du vent — Marseille</title>

  <!-- Chargement de la bibliothèque Google Charts -->
  <script src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    #chart { width: 100%; height: 500px; }
    #status { margin-top: 12px; color: #666; }
  </style>
</head>

<body>
  <h1>Vitesse du vent à Marseille (horaire)</h1>
  <div id="chart"></div>
  <div id="status">Chargement des données...</div>

  <script>
    google.charts.load('current', { packages: ['corechart'] });
    google.charts.setOnLoadCallback(init);

    let cachedData = null;

    async function init() {
      try {
        const data = await fetchAtelierData();
        cachedData = data;
        drawChart(data);
        showStatus(`OK — ${data.length} points chargés.`);
      } catch (err) {
        showStatus(`Erreur : ${err.message}`);
        console.error(err);
      }
    }

    async function fetchAtelierData() {
      const res = await fetch('/atelier/data', {
        headers: { 'Accept': 'application/json' }
      });

      if (!res.ok) {
        throw new Error(`Erreur HTTP ${res.status}`);
      }

      const json = await res.json();

      // Convertir les données pour Google Charts
      const rows = json.map(point => {
        const date = new Date(point.datetime);
        const windspeed = Number(point.windspeed);
        return [date, windspeed];
      });

      return rows;
    }

    function drawChart(rows) {
      const data = new google.visualization.DataTable();
      data.addColumn('datetime', 'Date/Heure');
      data.addColumn('number', 'Vitesse du vent (km/h)');
      data.addRows(rows);

      const options = {
        title: 'Vitesse du vent à Marseille (prochains jours)',
        legend: { position: 'bottom' },
        hAxis: {
          title: 'Date/Heure',
          format: 'dd/MM HH:mm'
        },
        vAxis: {
          title: 'Vitesse (km/h)'
        },
        chartArea: { width: '85%', height: '70%' },
        explorer: { actions: ['dragToZoom', 'rightClickToReset'] }
      };

      const chart = new google.visualization.AreaChart(document.getElementById('chart'));
      chart.draw(data, options);
    }

    function showStatus(msg) {
      document.getElementById('status').textContent = msg;
    }
  </script>
</body>
</html>
